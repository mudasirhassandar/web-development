<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color properties</title>
  </head>
  <style>
    /* color keywords */
    #p1 {
      color: red;
      background-color: black;
    }
    /* hexa color */
    #p2 {
      color: #0000ff;
      background-color: #0f0;
    }
    /* rgb color  0-255*/
    #p3 {
      color: rgb(255, 0, 0);
      background-color: rgb(0, 255, 0);
    }
    /* rgba color a/alpha->transpency from 0-1 */
    #p4 {
      color: rgba(150, 100, 210, 0.5);
    }
    /* HSL color */
    #p5 {
      color: hsl(88, 40%, 70%);
      /* hsla color */
      background-color: hsla(78, 60%, 50%, 0.5);
    }
    #p6 {
      text-shadow: 2px 2px 5px gray;
      box-shadow: 3px 10px 5px black;
    }
  </style>
  <body>
    <div>
      <p id="p1">hello i am mudasir</p>
      <p id="p2">I am from Tral</p>
      <p id="p3">I am in computer science and engineering</p>
      <p id="p4">Lorem ipsum dolor sit, amet consectetur adipisicing elit.</p>
      <p id="p5">Lorem ipsum dolor, sit amet consectetur adipisicing.</p>
      <p id="p6">Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
    </div>
  </body>
</html>
