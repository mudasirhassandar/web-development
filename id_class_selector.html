<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>id and class selectors</title>
    <style>
      #p1 {
        background-color: black;
        color: white;
        font-size: large;
      }
      #p2 {
        background-color: aqua;
      }
      .c1 {
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>Stop Drugs</h1>
    <p id="p1">say no to drugs and yes to life</p>
    <p id="p2" class="c1">stop using drugs</p>
    <p class="c1">be responsible for your family</p>
    <p class="c1">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Repellendus,
      repellat.
    </p>
  </body>
</html>
