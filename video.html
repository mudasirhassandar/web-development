<!-- how to use video-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>video</title>
  </head>
  <body>
    <p>This is a simple video example.</p>
    <video src="video.mp4" controls width="200"></video>
    <p>This is a video with autoplay.</p>
    <video src="video.mp4" controls autoplay width="200"></video>
    <p>This is a video with loop.</p>
    <video src="video.mp4" controls loop width="200"></video>
    <p>This is a video with a poster image.</p>
    <video src="video.mp4" poster="image.jpg"  controls width="200"></video>
     <p>This is a video with muted audio.</p>
    <video src="video.mp4" controls muted width="200"></video>
  
  </body>
  </body>
</html>
