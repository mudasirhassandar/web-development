<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>multicolor navbar</title>
    <style>
      :root {
        --color: rgb(72, 255, 0);
      }
      * {
        margin: 0px;
        padding: 0px;
      }
      nav ul li {
        list-style: none;
        padding: 30px;
        margin: 3px;
      }
      ul {
        display: flex;
        background-color: var(--color);
      }
    </style>
  </head>

  <body>
    <header>
      <nav>
        <ul>
          <li>Home</li>
          <li>About us</li>
          <li>Contact</li>
        </ul>
      </nav>
    </header>
  </body>
</html>
