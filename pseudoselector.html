<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pseudo selector</title>
    <style>
      a:link {
        /* default colour is blue  */
        color: aqua;
      }
      a:visited {
        color: green;
      }
      a:hover {
        color: blueviolet;
      }
      a:active {
        color: red;
      }
    </style>
  </head>
  <body>
    <p><a href="https://www.google.com" target="_blank">Google</a></p>
    <p><a href="https://www.facebook.com" target="_blank">Facebook</a></p>
    <p><a href="https://www.instagram.com" target="_blank">Instagram</a></p>
    <p><a href="https://www.snapchat.com" target="_blank">Snapchat</a></p>
  </body>
</html>
