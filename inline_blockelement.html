<!-- use of inline and block element -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inline&blockelement</title>
    <style>
      p {
        background-color: red;
      }
      span {
        background-color: yellow;
      }
      a {
        background-color: green;
      }
      div {
        background-color: rgb(86, 86, 170);
      }
    </style>
  </head>
  <body>
    <p>hey i am a block element</p>
    <span>hey i am an inline element</span>
    <a href="https://google.com">Google</a>
    <div>hey i am a block element...</div>
  </body>
</html>
