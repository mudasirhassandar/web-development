<!-- use of svg for drawing circles, rectangles, and lines. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG</title>
  </head>
  <body>
    <svg>
      <circle
        cx="50"
        cy="50"
        r="40"
        stroke="black"
        stroke-width="3"
        fill="red"
      />
      <rect
        x="120"
        y="10"
        width="80"
        height="80"
        stroke="black"
        stroke-width="3"
        fill="blue"
      />
      <line
        x1="10"
        y1="150"
        x2="200"
        y2="150"
        stroke="green"
        stroke-width="4"
      />
    </svg>
  </body>
</html>
