<!-- why we use id and class in html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>id and classes</title>
    <style>
      /* Using ID to style a specific element */
      #myParagraph {
        color: blue;
        font-size: 20px;
      }

      /* Using class to style multiple elements */
      .c1 {
        color: red;
      }
      .c2 {
        font-weight: bold;
      }
      .c3 {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <p id="myParagraph">This is a paragraph with an ID.</p>
    <p class="c1 c2 c3">This is a paragraph with a class.</p>
  </body>
</html>
