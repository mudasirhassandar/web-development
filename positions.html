<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>position property</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }
      .box {
        width: 80vw;
        height: 133px;
        border: 2px solid black;
        padding: 3px;
        margin: 3px;
      }
      .box1 {
        background-color: red;
        position: sticky;
        margin: 0px;
        padding: 0px;
        width: 100vw;
        height: 30px;
        top: 0;
      }
      .box2 {
        background-color: aqua;
      }
      .box3 {
        background-color: green;
        /* position: fixed;
            bottom: 44px;
            left: 25vw; */
      }
      .box4 {
        background-color: yellow;
      }
      .parent {
        padding: 34px;
        margin: 34px;
        border: 2px solid black;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="box box1"></div>
      <div class="box box2"></div>
      <div class="box box3"></div>
      <div class="box box4"></div>
    </div>
  </body>
</html>
