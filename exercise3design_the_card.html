<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Id card</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }
      .box1 {
        border: 2px solid black;
        height: 600px;
        width: 353px;
        border-radius: 22px;
        position: relative;
        left: 516px;
        margin: 12px;
      }
      .imge img {
        position: absolute;
        top: 4px;
        left: 5px;
        border-radius: 22px;
        height: 300px;
        width: 345px;
      }
      .p {
        padding: 5px;
        border: 1px solid black;
        border-radius: 15px;
        top: 325px;
      }
      .p1 {
        position: absolute;
        left: 20px;
      }
      .p2 {
        position: absolute;
        left: 90px;
      }
      h2 {
        position: absolute;
        top: 370px;
        left: 10px;
      }
      h4 {
        position: absolute;
        top: 420px;
        left: 10px;
      }
      h3 {
        position: absolute;
        top: 560px;
        left: 130px;
        border: 1px solid gray;
        padding: 5px;
        border-radius: 15px;
        color: rgb(87, 87, 226);
        background-color: aliceblue;
      }
    </style>
  </head>
  <body>
    <div class="box1">
      <div>
        <div class="imge"><img src="image.jpg" alt="image" /></div>
      </div>
      <div>
        <p class="p p1">Nature</p>
        <p class="p p2">Lake</p>
        <h2>Lorem, ipsum dolor</h2>
        <h4>
          Lorem ipsum dolor sit amet, consectetur adipisicing elit. Perferendis
          ex explicabo libero officia iure esse, magnam sequi sed, minus alias
          eaque, illum officiis?
        </h4>
        <h3>Read More</h3>
      </div>
    </div>
  </body>
</html>
