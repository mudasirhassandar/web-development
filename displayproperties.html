<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display properties</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      .box {
        border: 2px solid blue;
        display: inline-block;
        padding: 45px;
        margin: 30px;
        width: 400px;
      }
      .box1 {
        /* display: flex;  */
        display: inline-flex;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="box box1">i am the box</div>
    <div class="box">i am also a box</div>
    <span>hey i am good</span>
    <span>boy</span>
  </body>
</html>
